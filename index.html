<!DOCTYPE html>
<html>
<head>
  <title>Happy Easter 🐣</title>
  <style>
    body {
      text-align: center;
      font-family: Arial, sans-serif;
      background-color: #fff6f9;
      padding-top: 100px;
    }

    #egg {
      width: 120px;
      height: 160px;
      margin: 0 auto;
      border-radius: 50% 50% 50% 50%;
      background: linear-gradient(135deg, #ffb6c1, #ffe4b5, #add8e6, #98fb98);
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      font-size: 50px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.3);
      transition: transform 0.2s, box-shadow 0.2s;
      position: relative;
      top: 20px;
    }

    #egg:hover {
      transform: scale(1.2) rotate(10deg);
      box-shadow: 0 10px 20px rgba(0,0,0,0.4);
    }

    #message {
      font-size: 20px;
      margin-bottom: 30px;
    }

    #photo {
      display: none;
      margin-top: 30px;
    }

    #photo img {
      max-width: 300px;
      border-radius: 16px;
    }

    #photo p {
      font-size: 18px;
      line-height: 1.5;
    }
  </style>
</head>

<body>

<div id="message">
  Happy Easter 🐣<br><br>
  I hid something for you…<br>
  from your favorite ex (don’t argue) 😝
</div>

<div id="egg" onclick="handleClick()">🐣</div>

<div id="photo">
  <p>
    hehe 🤭<br><br>
    hope this little one has a happy Easter 🐣<br><br>
    you were so cute btw… what happened?! 🤣<br>
    jk jk you’re still cute to this day :)
  </p>
  <img src="baby.jpg" alt="baby photo">
</div>

<script>
  let clicks = 0;

  function handleClick() {
    clicks++;

    if (clicks === 1) {
      document.getElementById("message").innerHTML =
        "HAHA 😝 not that easy<br><br>try again…";
    } else if (clicks === 2) {
      document.getElementById("egg").style.display = "none";
      document.getElementById("photo").style.display = "block";
    }
  }
</script>

</body>
</html>
